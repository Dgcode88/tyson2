<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#F5B643"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background for maskable / apple-touch: the platform applies its
       own circle/squircle mask, so the brand mark sits inside the center safe zone. -->
  <rect width="512" height="512" fill="#0B0E14"/>
  <g transform="translate(96 96) scale(5)">
    <circle cx="32" cy="32" r="22" fill="none" stroke="#1C2230" stroke-width="5"/>
    <path d="M32 10 a22 22 0 0 1 19 33" fill="none" stroke="url(#ring)"
          stroke-width="5" stroke-linecap="round"/>
    <text x="32" y="42" text-anchor="middle" font-family="Archivo, Arial, sans-serif"
          font-size="30" font-weight="900" fill="#F5F7FA">T</text>
  </g>
</svg>
